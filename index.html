<!DOCTYPE html>
<html lang="ko">
<head>
  <meta property="og:title" content="황금봄나들이🎉">
<meta property="og:description" content="함께 즐겨요 😎">
<meta property="og:image" content="https://i.imgur.com/a/TjhdJro.jpg">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>황금 야유회 초대장</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  /* 🍑 피치톤 그라데이션 */
  background: linear-gradient(135deg, #FFBFC0, #FFE5E6);
  color: #333;
}

.section {
  padding: 60px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.hero {
  /* 💡 배경 제거하고 이미지 그대로 사용 */
  height: auto;
  background: none;
  display: block;
  position: relative;
}

.hero img {
  width: 100%; /* 👉 폰 너비 꽉 채움 */
  height: auto; /* 👉 원본 비율 유지 */
  display: block;
}

.hero-text {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.text-box {
  display: inline-block;
  background: rgba(255, 105, 180, 0.85);
  padding: 15px 25px;
  border-radius: 16px;
  color: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.hero h1, .hero p, .fun {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 1s ease forwards;
}

.hero h1 { animation-delay: 0.3s; font-size: 42px; }
.hero p { animation-delay: 0.8s; font-size: 24px; }
.fun { animation-delay: 1.3s; font-size: 28px; margin-top: 20px; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.info {
  background: rgba(255,255,255,0.9);
  font-size: 16px;
  line-height: 1.8;
  border-radius: 20px;
  margin: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.button {
  display: inline-block;
  margin-top: 25px;
  padding: 15px 30px;
  background: #ff4f81;
  color: white;
  border-radius: 30px;
  text-decoration: none;
  font-size: 16px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.button:hover { background: #e84370; }

</style>
</head>

<body>

<!-- 첫 화면 -->
<div class="hero">
  <!-- 👉 메인 이미지 그대로 표시 -->
  <img src="main.jpg">
  
  <!-- 👉 텍스트는 위에 띄움 -->
  <div class="hero-text">
    <h3><span class="text-box">🎉황금 봄나들이🎉</span></h3>
    <p><span class="text-box">일은 잠시 잊고, 제대로 놀아봅시다😎</span></p>
    <div class="fun"><span class="text-box">🤣웃고, 먹고, 즐기는 1박 2일🙌</span></div>
  </div>
</div>
</div>

<!-- 일정 안내 -->
<div class="section info">
  <h2>📍 일정 안내</h2>
  <p>📅 2026년 5월 1일 ~ 2일</p>
  <p>📌 장소 : 문경 최고의 장소 😆</p>
  <p>⏰ 집합 : 오전 10시</p>
</div>

<!-- 일정 이미지 -->
<div class="section gallery">
  <h2>📅 일정</h2>
  <!-- 👉 같은 폴더에 schedule.jpg 넣기 -->
  <img src="schedule.jpg">
</div>

  <!-- 팀 안내 -->
<div class="section gallery">
  <h2>👥 팀 안내</h2>
   
   <img src="https://i.imgur.com/7o6guRv.jpg">
    
  </div>
</div>
  
<!-- 준비물 이미지 -->
<div class="section gallery">
  <h2>🎒 준비물</h2>
  <!-- 👉 같은 폴더에 prep.jpg 넣기 -->
  <img src="prep.jpg">
</div>



<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.2 });

sections.forEach(section => observer.observe(section));
</script>


<!-- 찬조 영역 -->
<div class="section cloes">
  <h2>💌 마음을 전하실 곳</h2>
  <div style="background: rgba(255,255,255,0.9); padding:20px; border-radius:15px; display:inline-block; margin-top:15px;">
    <!-- 👉 여기에 계좌번호 입력 -->
    <p style="font-size:18px; font-weight:bold;">은행명 : 국민은행</p>
    <p style="font-size:18px; font-weight:bold;">계좌번호 : 697602-01-067372</p>
    <p style="font-size:16px;">예금주 : 김원화</p>
  </div>
</div>

</body>
</html>
